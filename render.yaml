services:
  - type: web
    name: plan2render
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: plan2render-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: plan2render-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: OUTPUT_DIR
        value: /var/data/outputs
      - key: FRONTEND_DIST
        value: /app/frontend/dist
      - key: PYTHON_PATH
        value: /opt/venv/bin/python
    disk:
      name: plan2render-data
      mountPath: /var/data
      sizeGB: 1

  - type: keyvalue
    name: plan2render-redis
    plan: starter
    ipAllowList: []

databases:
  - name: plan2render-db
    plan: starter
    databaseName: plan2render
    user: plan2render
