# fly.toml app configuration generated
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "frinto-3d-render"
primary_region = "iad"

[build]
  image = "frinto-3d-render:latest"
  dockerfile = "Dockerfile"

# Processes
[[processes]]
  name = "backend"
  cmd = "npm run start --workspace=plan2render-backend"
  auto_start = true
  auto_stop = true

[[processes]]
  name = "worker"
  cmd = "npm run start --workspace=plan2render-worker"
  auto_start = true
  auto_stop = false

[env]
  NODE_ENV = "production"
  PORT = "5000"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["backend"]

[[statics]]
  guest_path = "/app/uploads"
  url_prefix = "/uploads"

[[statics]]
  guest_path = "/app/outputs"
  url_prefix = "/outputs"

[checks]
  [checks.status]
    type = "http"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
