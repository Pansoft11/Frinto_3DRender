version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: plan2render-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: plan2render
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7
    container_name: plan2render-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: plan2render-backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/plan2render
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_secret_key_here
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs

  # Worker Process
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: plan2render-worker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/plan2render
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs

  # Frontend (optional - usually served from CDN)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: plan2render-frontend
    ports:
      - "80:80"
    environment:
      VITE_API_URL: http://backend:5000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: plan2render-network
